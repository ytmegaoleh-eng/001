<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.4)),
                url('bg.jpg') center/cover no-repeat fixed;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            padding-bottom: 40px; 
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 0 20px;
        }

        /* Обновленный блок текста */
        .promo-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1.6;
            color: #fff;
            
            /* Розовое неоновое свечение под стиль картинки */
            text-shadow: 
                0 0 10px #ff00c8, 
                0 0 20px #ff00c8;
                
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
        }

        .menu {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 65px;
            font-size: 1rem;
            letter-spacing: 3px;
            text-decoration: none;
            text-align: center;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px #ff00c8;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(0, 247, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.02);
            background: rgba(255, 0, 200, 0.15);
            box-shadow: 0 0 25px rgba(255, 0, 200, 0.4);
            border-color: #00f7ff;
        }

        @media(max-width: 480px) {
            .promo-text { font-size: 0.95rem; }
            .btn { min-height: 60px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="promo-text">
            Telegram Store <br>
            Annoimus Numbers 🇺🇦 7$=1
        </div>

        <div class="menu">
            <a href="https://t.me/elecrum_job" class="btn">INFO CHANNEL</a>
            <a href="https://t.me/electrum_store" class="btn">OPERATOR</a>
        </div>
    </div>

</body>
</html>
