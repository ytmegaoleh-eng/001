
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --deep-purple: #4b0082;
            --cyan-accent: #00f7ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            height: 100vh;
            background: 
                linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 40%, transparent 100%),
                url('bg.jpg') center/cover no-repeat fixed;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            padding-bottom: 25px;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            z-index: 10;
            padding: 0 20px;
            animation: fadeIn 1s ease-out;
        }

        /* Твоя идеальная плашка */
        .info-card {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4); 
            padding: 12px 10px;
            margin-bottom: 15px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .promo-text { color: #fff; text-transform: uppercase; line-height: 1.3; }
        .line-1 { font-size: 1rem; font-weight: 800; display: block; letter-spacing: 1px; }
        .price-line { 
            display: block; 
            margin-top: 5px; 
            font-size: 1.3rem; 
            font-weight: 900; 
            color: var(--cyan-accent); 
            text-shadow: 0 0 15px var(--cyan-accent); 
        }

        /* --- ГЛЯНЦЕВЫЕ ФИОЛЕТОВЫЕ КНОПКИ --- */
        .menu { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            position: relative;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.5);
            
            /* Глубокий фиолетовый градиент */
            background: linear-gradient(180deg, #240046 0%, #10002b 100%);
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(188, 19, 254, 0.2);
            
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Стеклянный глянец (блик) */
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        /* Фиолетовое свечение снизу */
        .btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 30%;
            background: var(--neon-purple);
            filter: blur(15px);
            opacity: 0.3;
            transition: 0.4s;
        }

        .btn-text {
            font-size: 1.3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 5;
            text-shadow: 0 0 10px var(--neon-purple);
            transition: 0.4s;
        }

        /* Эффекты при наведении */
        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--neon-purple);
            background: linear-gradient(180deg, #3c096c 0%, #240046 100%);
            box-shadow: 
                0 15px 30px rgba(188, 19, 254, 0.4),
                inset 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .btn:hover::after { opacity: 0.7; height: 50%; }
        .btn:hover .btn-text { letter-spacing: 6px; text-shadow: 0 0 20px #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media(max-width: 480px) {
            .btn { height: 60px; }
            .btn-text { font-size: 1.1rem; letter-spacing: 2px; }
            .line-1 { font-size: 0.9rem; }
            .price-line { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="info-card">
            <div class="promo-text">
                <span class="line-1">🔰⚜️dark service⚜️🔰</span> 
                    <span class="line-2">🃏😮‍💨Тг аки, Мануалы анонимности, Рассылка, Work team и другое🔥♠️</span>
                <span class="price-line">⚜️Вся нужная информация в инфо канале⚜️</span>
                <span class="line-3">🤗По поподу покупки пишите оператору🤗</span>
            </div>
        </div>

        <div class="menu">
            <a href="https://t.me/darksmsel" class="btn">
                <span class="btn-text">ІНФО КАНАЛ</span>
            </a>
            <a href="https://t.me/electrum_store" class="btn">
                <span class="btn-text">ОПЕРАТОР</span>
            </a>
        </div>
    </div>

</body>
</html>
