<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    /* Убрали темный градиент, оставили легкое затемнение для читаемости */
    background: 
        linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)),
        url('bg.jpg') center/cover no-repeat fixed;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.menu {
    width: 90%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
    font-size: 1.8rem;
    letter-spacing: 5px;
    text-decoration: none;
    font-weight: 800;
    
    /* Цвет текста и основной неон под стиль картинки */
    color: #fff;
    text-shadow: 0 0 10px #ff00c8, 0 0 20px #ff00c8;
    
    /* Прозрачный фон кнопок (стеклянный эффект) */
    background: rgba(255, 0, 200, 0.05);
    border-radius: 15px;
    border: 2px solid rgba(255, 0, 200, 0.5);
    backdrop-filter: blur(5px);
    
    /* Свечение кнопки */
    box-shadow: 
        0 0 20px rgba(255, 0, 200, 0.3),
        inset 0 0 15px rgba(0, 247, 255, 0.2);
    
    transition: all 0.4s ease;
    overflow: hidden;
}

/* Анимированная рамка (градиент как на картинке) */
.btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 15px;
    padding: 2px; /* толщина рамки */
    background: linear-gradient(90deg, #ff00c8, #00f7ff, #ff00c8);
    background-size: 200%;
    -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: borderMove 4s linear infinite;
}

/* Блик молнии */
.btn::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(0, 247, 255, 0.4),
        transparent
    );
    transform: translateX(-100%);
    transition: 0.6s;
}

/* Эффекты при наведении */
.btn:hover {
    transform: translateY(-5px) scale(1.02);
    background: rgba(255, 0, 200, 0.2);
    box-shadow: 
        0 0 40px rgba(255, 0, 200, 0.6),
        0 0 15px rgba(0, 247, 255, 0.8);
}

.btn:hover::before {
    transform: translateX(100%);
}

@keyframes borderMove {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

@media(max-width:700px) {
    .btn {
        height: 80px;
        font-size: 1.3rem;
        letter-spacing: 3px;
    }
}
</style>
