<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMS Premium 12K</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background: 
                linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%),
                url('bg.jpg') center/cover no-repeat fixed;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            padding-bottom: 30px;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 520px;
            z-index: 10;
            padding: 0 20px;
        }

        /* --- КОМПАКТНАЯ ПЛАШКА С БЕЛОЙ ОБВОДКОЙ --- */
        .info-card {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4); /* Тонкая белая обводка */
            padding: 12px 5px;
            margin-bottom: 25px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .promo-text {
            color: #fff;
            text-transform: uppercase;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .promo-text span { display: block; font-size: 1.15rem; font-weight: 800; }
        
        .price-line {
            margin-top: 5px;
            font-size: 1.35rem !important;
            font-weight: 900;
            color: #00f7ff;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
        }

        /* --- ГЛЯНЦЕВЫЕ 3D КНОПКИ --- */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px; /* Увеличенная высота */
            font-size: 1.4rem; /* Крупный шрифт */
            font-weight: 900;
            text-decoration: none;
            color: #fff;
            letter-spacing: 2px;
            border-radius: 20px;
            
            /* Эффект жидкого глянца и 3D объема */
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.15) 0%, 
                rgba(255,255,255,0.05) 50%, 
                rgba(0,0,0,0.3) 100%);
            
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            
            /* Сложный 3D эффект шрифта */
            text-shadow: 
                0 1px 0 #ccc, 
                0 2px 0 #c9c9c9, 
                0 3px 0 #bbb, 
                0 4px 0 #b9b9b9, 
                0 10px 10px rgba(0,0,0,0.6);
            
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.4),
                inset 0 2px 15px rgba(255,255,255,0.1);
            
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        /* Блик жидкого глянца */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #00f7ff;
            box-shadow: 0 15px 30px rgba(0, 247, 255, 0.3);
            text-shadow: 0 0 15px #00f7ff;
        }

        .btn-op:hover {
            border-color: #ff00c8;
            box-shadow: 0 15px 30px rgba(255, 0, 200, 0.3);
            text-shadow: 0 0 15px #ff00c8;
        }

        @media(max-width: 480px) {
            .promo-text span { font-size: 0.95rem; }
            .price-line { font-size: 1.1rem !important; }
            .btn { height: 70px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="info-card">
            <div class="promo-text">
                <span>УКРАЇНСЬКИЙ МАГАЗИН</span>
                <span>АНОНІМНИХ НОМЕРІВ</span>
                <span class="price-line">TELEGRAM - 7$ АККАУНТ</span>
            </div>
        </div>

        <div class="menu">
            <a href="https://t.me/elecrum_job" class="btn">ІНФО КАНАЛ</a>
            <a href="https://t.me/electrum_store" class="btn btn-op">ОПЕРАТОР</a>
        </div>
    </div>

</body>
</html>
