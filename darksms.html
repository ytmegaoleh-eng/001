<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMS UI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Замените ссылку на свое фоновое изображение с молниями */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 60px;
            text-transform: uppercase;
            margin: 0;
            line-height: 0.9;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 20%, #b85fcc 50%, #5e2a7a 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(184, 95, 204, 0.8));
            letter-spacing: -2px;
        }

        .promo-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin: 30px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .highlight {
            color: #4ed9ff;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin-top: 5px;
            text-shadow: 0 0 8px #4ed9ff;
        }

        .button {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 10px 0;
            background: linear-gradient(to bottom, #3d1451, #1a0824);
            border: 1px solid #7e30a3;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .button:active {
            transform: scale(0.98);
            background: #5e2a7a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DARK<br>SMS</h1>

        <div class="promo-box">
            🇺🇦🤝УКРАЇНСЬКИЙ МАГАЗИН🤝🇺🇦<br>
            🃏 АНОНІМНІ, СУПЕРМІЦНІ ♠️<br>
            <span class="highlight">⚜️ TG PREMIUM АКАУНТИ ⚜️</span>
        </div>

        <a href="#" class="button">Інфо канал</a>
        <a href="#" class="button">Оператор</a>
    </div>

</body>
</html>
